<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>HookWatch — Webhook Observability Platform</title>
    <meta name="description" content="Monitor, replay, and get instant alerts for all your webhooks. Zero-config webhook observability with real-time event inspection, failure detection, and team collaboration." />
    <meta name="keywords" content="webhook monitoring, webhook observability, webhook replay, webhook alerts, webhook inspector, API monitoring" />
    <meta name="author" content="HookWatch" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://hookwatch.io/" />
    <meta property="og:title"       content="HookWatch — Webhook Observability Platform" />
    <meta property="og:description" content="Monitor, replay, and get instant alerts for all your webhooks. Never miss a failed delivery again." />
    <meta property="og:image"       content="https://hookwatch.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="HookWatch" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@hookwatch" />
    <meta name="twitter:title"       content="HookWatch — Webhook Observability Platform" />
    <meta name="twitter:description" content="Monitor, replay, and get instant alerts for all your webhooks." />
    <meta name="twitter:image"       content="https://hookwatch.io/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://hookwatch.io/" />

    <!-- Web app manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#185FA5" />

    <!-- Structured data — SaaS product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "HookWatch",
      "applicationCategory": "DeveloperApplication",
      "description": "Webhook observability platform — monitor, replay, and alert on all your webhook deliveries.",
      "url": "https://hookwatch.io",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free" },
        { "@type": "Offer", "price": "19", "priceCurrency": "USD", "name": "Starter" },
        { "@type": "Offer", "price": "79", "priceCurrency": "USD", "name": "Team" }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
